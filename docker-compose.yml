services:
  web:
    build:
      context: .
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "4321:4321"
    environment:
      ASTRO_BASE: "/"
      ASTRO_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
